<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 6 - Contact Form | KOLSS Kitchen Estimator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(214.3 31.8% 91.4%)",
                        input: "hsl(214.3 31.8% 91.4%)",
                        ring: "hsl(222.2 84% 4.9%)",
                        background: "hsl(0 0% 100%)",
                        foreground: "hsl(222.2 84% 4.9%)",
                        primary: {
                            DEFAULT: "hsl(222.2 47.4% 11.2%)",
                            foreground: "hsl(210 40% 98%)",
                        },
                        secondary: {
                            DEFAULT: "hsl(210 40% 96.1%)",
                            foreground: "hsl(222.2 47.4% 11.2%)",
                        },
                        muted: {
                            DEFAULT: "hsl(210 40% 96.1%)",
                            foreground: "hsl(215.4 16.3% 46.9%)",
                        },
                        card: {
                            DEFAULT: "hsl(0 0% 100%)",
                            foreground: "hsl(222.2 84% 4.9%)",
                        },
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="container mx-auto px-4 py-4">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <h1 class="text-xl md:text-2xl font-bold text-slate-900">KOLSS Premium Kitchen Estimator</h1>

                <!-- Step Indicator -->
                <div class="flex items-center gap-2 text-sm">
                    <span class="font-medium text-slate-900">Step 6</span>
                    <span class="text-slate-400">of 7</span>
                </div>

                <!-- Currency Toggle -->
                <div class="inline-flex items-center rounded-md border border-slate-200 bg-white p-1">
                    <button class="inline-flex items-center justify-center rounded-sm px-3 py-1.5 text-sm font-medium bg-slate-900 text-white">EUR</button>
                    <button class="inline-flex items-center justify-center rounded-sm px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-100">PLN</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 container mx-auto px-4 py-8 max-w-3xl">
        <div class="space-y-6">
            <!-- Page Title -->
            <div class="space-y-2">
                <h2 class="text-3xl font-bold tracking-tight text-slate-900">Get your final offer</h2>
                <p class="text-slate-500">Leave your details and our designer will contact you within 24h.</p>
            </div>

            <!-- Contact Form -->
            <div class="rounded-xl border border-slate-200 bg-white p-6 md:p-8 shadow-sm">
                <div class="space-y-6">
                    <!-- Full Name -->
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-900">
                            Full Name <span class="text-red-500">*</span>
                        </label>
                        <input
                            type="text"
                            placeholder="Enter your full name"
                            class="flex h-10 w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2"
                        />
                    </div>

                    <!-- Phone Number -->
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-900">
                            Phone Number <span class="text-red-500">*</span>
                        </label>
                        <input
                            type="tel"
                            placeholder="+48 123 456 789"
                            class="flex h-10 w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2"
                        />
                    </div>

                    <!-- Email Address -->
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-900">Email Address</label>
                        <input
                            type="email"
                            placeholder="your.email@example.com"
                            class="flex h-10 w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2"
                        />
                    </div>

                    <!-- City & Country -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-900">City</label>
                            <input
                                type="text"
                                placeholder="Warsaw"
                                class="flex h-10 w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2"
                            />
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-900">Country</label>
                            <input
                                type="text"
                                placeholder="Poland"
                                class="flex h-10 w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2"
                            />
                        </div>
                    </div>

                    <!-- Comment / Additional Details -->
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-900">Comment / Additional Details</label>
                        <textarea
                            rows="4"
                            placeholder="Tell us more about your project, preferred timeline, or any specific requirements..."
                            class="flex w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2 resize-none"
                        ></textarea>
                    </div>

                    <!-- Privacy Checkbox -->
                    <div class="flex items-start gap-3 pt-2">
                        <div class="flex h-5 w-5 items-center justify-center rounded-sm border-2 border-slate-900 bg-slate-900 flex-shrink-0 mt-0.5">
                            <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>
                        <label class="text-sm text-slate-600 leading-relaxed">
                            I agree to the processing of personal data. We do not use data for marketing purposes, only to contact you regarding your request.
                        </label>
                    </div>

                    <!-- Estimated Total Reminder -->
                    <div class="rounded-lg bg-slate-50 border border-slate-200 p-4 mt-6">
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-slate-600">Your estimated total</span>
                            <span class="text-xl font-bold text-slate-900">5,175 EUR</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Info Banner -->
            <div class="rounded-lg border border-green-200 bg-green-50 p-4">
                <div class="flex gap-3">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <div class="text-sm text-green-900">
                        <p class="font-medium">Fast Response</p>
                        <p class="text-green-700 mt-1">Our design team responds to all inquiries within 24 hours on business days.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 sticky bottom-0">
        <div class="container mx-auto px-4 py-4">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <!-- Estimated Total -->
                <div class="space-y-1">
                    <div class="text-sm text-slate-500">Estimated Total</div>
                    <div class="text-2xl font-bold text-slate-900">5,175 EUR</div>
                </div>

                <!-- Action Buttons -->
                <div class="flex gap-3">
                    <button class="inline-flex items-center justify-center rounded-md text-sm font-medium border border-slate-200 bg-white hover:bg-slate-100 h-10 px-4 py-2">
                        Back
                    </button>
                    <button class="inline-flex items-center justify-center rounded-md text-sm font-medium bg-slate-900 text-white hover:bg-slate-900/90 h-10 px-8 py-2">
                        Get Offer
                    </button>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
